<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Re:Turn Borrow System</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
      /* --- 你的原版开屏动画 (保留) --- */
      #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #06C755 0%, #04a847 100%);
        z-index: 9999; display: flex; justify-content: center; align-items: center;
        flex-direction: column; transition: opacity 0.8s ease-out, visibility 0.8s;
        padding: 20px; box-sizing: border-box;
      }
      .splash-content { text-align: center; color: white; }
      .splash-title { font-family: 'Montserrat', sans-serif; font-size: 56px; font-weight: 900; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.1); animation: scalePulse 2s infinite; }
      .splash-sub { font-family: 'Montserrat', sans-serif; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s ease-out forwards; }
      .sub-credit-group { margin-bottom: 15px; }
      .sub-org { font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
      .sub-author { font-size: 11px; font-weight: 500; opacity: 0.9; }
      .sub-divider { width: 40px; height: 2px; background: rgba(255,255,255,0.6); margin: 0 auto 15px auto; border-radius: 2px; }
      .sub-slogan-group { text-transform: uppercase; }
      .sub-action { font-size: 10px; font-weight: 600; letter-spacing: 1px; opacity: 0.8; font-style: italic; }
      .delay-1 { animation-delay: 0.2s; } .delay-2 { animation-delay: 0.3s; } .delay-4 { animation-delay: 0.5s; }
      @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
      .fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

      /* --- 全局样式 --- */
      body { font-family: "Noto Sans JP", -apple-system, sans-serif; background-color: #f7f9fa; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; color: #333; }
      .top-logo { height: 50px; margin-bottom: 20px; object-fit: contain; }
      .bottom-logos { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; margin-bottom: 10px; }
      .small-logo { height: 30px; opacity: 0.8; }
      .credit { margin-top: 20px; font-size: 10px; color: #B0B0B0; font-family: sans-serif;}

      /* --- 卡片容器 --- */
      .card { background: white; width: 85%; max-width: 340px; padding: 40px 30px; border-radius: 24px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08); border: 1px solid #fff; text-align: center; position: relative; overflow: hidden; }

      /* --- 借出视图 --- */
      h1 { margin: 0; font-size: 24px; font-weight: 900; color: #111; letter-spacing: -0.5px;}
      p.subtitle { margin: 8px 0 25px 0; font-size: 13px; color: #666; font-weight: 700; }
      .id-wrapper { background: linear-gradient(180deg, #F7F9FB 0%, #ffffff 100%); border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 2px dashed #E0E0E0; position: relative; }
      .label { font-size: 11px; font-weight: 900; color: #06C755; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
      .container-id { font-size: 42px; font-weight: 900; color: #222; font-family: 'Montserrat', sans-serif; text-shadow: 2px 2px 0px #e8f5e9;}

      /* 脉冲按钮 */
      button { background: linear-gradient(135deg, #06C755 0%, #00b34a 100%); color: white; border: none; padding: 18px; font-size: 18px; border-radius: 50px; width: 100%; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(6, 199, 85, 0.3); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
      button:active { transform: scale(0.92); box-shadow: 0 4px 10px rgba(6, 199, 85, 0.2); }
      button:disabled { background: #E0E0E0; color: #999; box-shadow: none; transform: none; animation: none;}
      .btn-ready { animation: pulseGlow 2s infinite; }

      /* --- 成功视图 & 游戏化面板 --- */
      .success-view { display: none; }
      .success-icon { font-size: 70px; color: #06C755; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform: scale(0); margin-bottom: -10px;}
      
      /* 段位展示卡 */
      .rank-card { background: #222; color: white; border-radius: 16px; padding: 20px 15px; margin: 20px 0; position: relative; overflow: hidden; animation: slideUp 0.6s 0.2s both; border: 2px solid #333;}
      .rank-title { font-size: 11px; color: #aaa; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
      .rank-name { font-size: 20px; font-weight: 900; color: #FFD700; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,215,0,0.4); }
      
      .stats-row { display: flex; justify-content: space-around; align-items: center; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; }
      .stat-item { display: flex; flex-direction: column; align-items: center; }
      .stat-label { font-size: 10px; color: #aaa; margin-bottom: 2px;}
      .stat-val { font-size: 24px; font-family: 'Montserrat', sans-serif; font-weight: 900; color: #fff;}
      .stat-val span { font-size: 12px; font-weight: 700;}

      .eco-text { font-size: 13px; font-weight: 700; color: #555; margin-top: 20px; animation: slideUp 0.6s 0.4s both;}

      /* --- 动画 --- */
      @keyframes scalePulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
      @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(6, 199, 85, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(6, 199, 85, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 199, 85, 0); } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes popIn { 0% { transform: scale(0) rotate(-15deg); } 80% { transform: scale(1.1) rotate(5deg); } 100% { transform: scale(1) rotate(0deg); } }
    </style>
  </head>
<body>

    <div id="splash-screen">
      <div class="splash-content">
        <div class="splash-title">Re:Turn</div>
        <div class="splash-sub sub-credit-group delay-1">
          <div class="sub-org">SFC Wada Lab & Megloo</div>
          <div class="sub-author">Presented by Kouzen Jo</div>
        </div>
        <div class="splash-sub sub-divider delay-2"></div>
        <div class="splash-sub sub-slogan-group">
          <div class="sub-action delay-4">Think big, start small.</div>
        </div>
      </div>
    </div>

    <img src="sfc_logo.png" class="top-logo" alt="Keio SFC">

    <div class="card" id="main-card">
      
      <div id="borrow-view">
        <h1>Re:Turn 貸出</h1>
        <p class="subtitle">Mission: Save the Earth</p>
        
        <div class="id-wrapper">
          <span class="label">Container ID</span>
          <div id="cid-display" class="container-id">...</div>
        </div>
        
        <button id="btn-borrow" onclick="handleBorrow()" disabled>
          System Initializing...
        </button>
      </div>

      <div id="success-view" class="success-view">
        <div class="success-icon">✓</div>
        <h2 style="margin: 10px 0 20px 0; font-weight: 900;">貸出完了!</h2>
        
        <div class="rank-card">
          <div class="rank-title">Current Rank</div>
          <div class="rank-name" id="user-rank">🌱 エコビギナー</div>
          
          <div class="stats-row">
            <div class="stat-item">
              <span class="stat-label">Total Borrows</span>
              <div class="stat-val" id="borrow-count">0</div>
            </div>
            <div class="stat-item">
              <span class="stat-label">CO2 Saved</span>
              <div class="stat-val"><span id="co2-count">0</span><span>g</span></div>
            </div>
          </div>
        </div>
        
        <p class="eco-text">
          地球のHPが回復しました！🌎<br>
          美味しく召し上がれ🍱
        </p>
      </div>

    </div>

    <div class="bottom-logos">
      <img src="lab_logo.png" class="small-logo" alt="Lab Logo">
      <img src="megloo_logo.png" class="small-logo" alt="Megloo Logo">
    </div>

    <div class="credit">
        Keio SFC Wada Lab | 2025 © Designed & Developed by Kouzen Jo
    </div>

    <script>
      const GAS_API_URL = "https://script.google.com/macros/s/AKfycbybohIvFuZ7GZC7KVckrjb4mn1SFFT1wG-Z1Anabt02il3N05NweJNgsctcFedsi6QY/exec"; 
      const MY_LIFF_ID = "2008626930-AddPwDy7"; 

      let containerId = "";

      window.onload = function() {
        setTimeout(() => { document.getElementById('splash-screen').classList.add('fade-out'); }, 2200);

        const urlParams = new URLSearchParams(window.location.search);
        containerId = urlParams.get('id');
        if (!containerId) {
          const liffState = urlParams.get('liff.state');
          if (liffState && liffState.includes('id=')) containerId = liffState.split('id=')[1];
        }

        if (containerId) {
          document.getElementById('cid-display').innerText = containerId;
          initializeLiff();
        } else {
          document.getElementById('cid-display').innerText = "ERROR";
          document.getElementById('btn-borrow').innerText = "QRエラー";
        }
      };

      function initializeLiff() {
        liff.init({ liffId: MY_LIFF_ID }).then(() => {
          if (liff.isLoggedIn()) { readyToGo(); } else { liff.login(); }
        });
      }

      function readyToGo() {
        const btn = document.getElementById('btn-borrow');
        btn.disabled = false;
        btn.innerText = "START";
        btn.classList.add('btn-ready'); // 加上呼吸动效
      }

      function handleBorrow() {
        const btn = document.getElementById('btn-borrow');
        btn.disabled = true;
        btn.classList.remove('btn-ready');
        btn.innerText = "通信中...";

        const idToken = liff.getDecodedIDToken();
        if (!idToken) { location.reload(); return; }
        const userId = idToken.sub;

        fetch(GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          // 加上 action: 'borrow' 以匹配我们的 GAS 后端逻辑
          body: JSON.stringify({ action: 'borrow', userId: userId, containerId: containerId })
        })
        .then(response => response.json())
        .then(data => {
          // 这里需要根据你后端的实际返回值来判断，如果是之前我写的 GAS，成功会返回 status: 'success'
          if (data.status === 'success' || data.status === 'SUCCESS') {
            // 获取后端的借出总数，默认为 1
            const count = data.borrowCount || 1; 
            showSuccessAnimation(count);
          } else if (data.code === 'ALREADY_BORROWED') {
            alert("⚠️ この容器は既に貸出中です。\n先に返却してください。");
            btn.disabled = true;
            btn.innerText = "他のコードをスキャン"; 
          } else {
            alert("System Error: " + (data.message || "Unknown error"));
            btn.disabled = false;
            btn.innerText = "Retry";
          }
        })
        .catch(err => {
          console.error(err);
          alert("Network Error. Please try again.");
          btn.disabled = false;
          btn.innerText = "Retry";
        });
      }

      function getRankName(count) {
        if (count < 5) return { name: "🌱 エコビギナー", color: "#A8E6CF" };
        if (count < 15) return { name: "🌿 シルバーガーディアン", color: "#D4AF37" };
        if (count < 50) return { name: "🌳 ゴールドマスター", color: "#FFD700" };
        return { name: "👑 SFCの環境神", color: "#FF4500" };
      }

      // 数字滚动动画器
      function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
          if (!startTimestamp) startTimestamp = timestamp;
          const progress = Math.min((timestamp - startTimestamp) / duration, 1);
          obj.innerHTML = Math.floor(progress * (end - start) + start);
          if (progress < 1) { window.requestAnimationFrame(step); }
        };
        window.requestAnimationFrame(step);
      }

      function showSuccessAnimation(borrowCount) {
        document.getElementById('borrow-view').style.display = 'none';
        document.getElementById('success-view').style.display = 'block';
        
        // 触发满屏纸屑特效 (Juice!)
        var end = Date.now() + (1.5 * 1000);
        var colors = ['#06C755', '#ffffff'];
        (function frame() {
          confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
          confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
          if (Date.now() < end) { requestAnimationFrame(frame); }
        }());

        // 计算段位
        const rankInfo = getRankName(borrowCount);
        const rankEl = document.getElementById('user-rank');
        rankEl.innerText = rankInfo.name;
        rankEl.style.color = rankInfo.color;

        // 数字滚动：借出次数 和 减少的CO2 (假设每次 94g)
        const countEl = document.getElementById('borrow-count');
        const co2El = document.getElementById('co2-count');
        
        setTimeout(() => {
          animateValue(countEl, 0, borrowCount, 1500);
          animateValue(co2El, 0, borrowCount * 94, 2000);
        }, 400); // 稍微延迟等待 UI 展开

        setTimeout(() => { liff.closeWindow(); }, 6000); // 增加停留时间让玩家看段位
      }
    </script>
  </body>
</html>
